name: flutter_dot_loader
description: "Customizable dot-matrix and LED loading animations for Flutter — 60 patterns, scrolling marquee text, custom pixel frames, AI chat indicator. Zero deps."
version: 0.0.5
homepage: https://github.com/hooshyar/flutter_dot_loader
repository: https://github.com/hooshyar/flutter_dot_loader
issue_tracker: https://github.com/hooshyar/flutter_dot_loader/issues

topics:
  - loader
  - animation
  - dot-matrix
  - led
  - pixel-art

screenshots:
  - description: "Gallery of 60 dot-matrix loader patterns"
    path: assets/screenshot_gallery.png
  - description: "Interactive Dot Matrix Studio editor"
    path: assets/screenshot_studio.png

environment:
  sdk: ^3.11.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

